version: "3.9"

services:

  server:
    build: .
    environment:
      - SERVER=1
      - PORT=${PORT:-5000}
      - PROTO=${PROTO:-TCP}
    ports:
      - "${PORT:-5000}:${PORT:-5000}/tcp"
      - "${PORT:-5000}:${PORT:-5000}/udp"
    restart: unless-stopped

  client:
    build: .
    depends_on:
      - server
    environment:
      - DISPLAY=${DISPLAY:-:0}
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    network_mode: host